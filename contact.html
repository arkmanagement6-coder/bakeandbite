<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | BakeBite</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="header-root"></div>

    <main class="section">
        <div class="container">
            <div class="flex" style="gap: 80px;">
                <div style="flex: 1;">
                    <h2 style="font-size: 3rem; margin-bottom: 20px;">Get in Touch</h2>
                    <p style="margin-bottom: 40px; color: var(--text-muted); font-size: 1.1rem;">Have a question about our products or need help with an order? We're here to help!</p>
                    
                    <div style="margin-bottom: 30px;">
                        <h4 style="margin-bottom: 10px; font-family: var(--font-sans);">Visit Our Shop</h4>
                        <p style="color: var(--text-muted);">25/172 line no 11 12 patel nagar jeoni mandi agra 282004<br>Mon - Sat: 9:00 AM - 10:00 PM</p>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <h4 style="margin-bottom: 10px; font-family: var(--font-sans);">Email Support</h4>
                        <p style="color: var(--text-muted);">bakebite809@gmail.com</p>
                    </div>
                </div>

                <div style="flex: 1;">
                    <div class="glass-card" style="padding: 40px;">
                        <h3 style="margin-bottom: 30px;">Send a Message</h3>
                        <form id="contact-form">
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Your Name</label>
                                <input type="text" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); outline: none;">
                            </div>
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Email Address</label>
                                <input type="email" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); outline: none;">
                            </div>
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Subject</label>
                                <select style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); outline: none;">
                                    <option>Order Status</option>
                                    <option>Feedback</option>
                                    <option>Bulk Order Query</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div style="margin-bottom: 30px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Your Message</label>
                                <textarea rows="4" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); outline: none;"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-root"></div>

    <script type="module">
        import { renderHeader, renderFooter } from './js/components/common.js';
        document.getElementById('header-root').appendChild(renderHeader());
        document.getElementById('footer-root').appendChild(renderFooter());

        document.getElementById('contact-form').onsubmit = (e) => {
            e.preventDefault();
            alert('Thank you for your message! We will get back to you soon.');
            e.target.reset();
        };
    </script>
</body>
</html>
