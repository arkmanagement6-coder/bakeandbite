<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bakery Products | Bake & Bite</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .filter-section {
            width: 280px;
            flex-shrink: 0;
        }
        .product-grid {
            flex: 1;
        }
        .filter-group {
            margin-bottom: 30px;
        }
        .filter-group h4 {
            margin-bottom: 15px;
            font-family: var(--font-sans);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .filter-item input {
            cursor: pointer;
        }
        @media (max-width: 992px) {
            .products-layout {
                flex-direction: column;
            }
            .filter-section {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                gap: 20px;
                margin-bottom: 40px;
            }
            .filter-group {
                margin-bottom: 0;
            }
        }
    </style>
</head>
<body>
    <div id="header-root"></div>

    <main class="section">
        <div class="container">
            <h2 style="margin-bottom: 40px;">Explore Our Delicacies</h2>
            
            <div class="products-layout flex" style="gap: 40px;">
                <!-- Sidebar Filters -->
                <aside class="filter-section">
                    <div class="glass-card">
                        <div class="filter-group">
                            <h4>Categories</h4>
                            <div id="category-filters">
                                <!-- Categories injected here -->
                            </div>
                        </div>
                        
                        <div class="filter-group">
                            <h4>Price Range</h4>
                            <div class="filter-item"><input type="radio" name="price" value="all" checked> <span>All Prices</span></div>
                            <div class="filter-item"><input type="radio" name="price" value="0-500"> <span>Under ₹500</span></div>
                            <div class="filter-item"><input type="radio" name="price" value="500-1000"> <span>₹500 - ₹1000</span></div>
                            <div class="filter-item"><input type="radio" name="price" value="1000+"> <span>Over ₹1000</span></div>
                        </div>

                        <div class="filter-group">
                            <h4>Dietary</h4>
                            <div class="filter-item"><input type="checkbox" id="eggless-filter"> <span>Eggless Only</span></div>
                        </div>

                        <div class="filter-group">
                            <h4>Flavor</h4>
                            <div id="flavor-filters">
                                <!-- Flavors injected here -->
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- Product Listing -->
                <div class="product-grid">
                    <div class="flex justify-between align-center" style="margin-bottom: 30px;">
                        <p id="product-count" style="color: var(--text-muted); font-weight: 500;">Showing 0 products</p>
                        <div class="flex align-center" style="gap: 10px;">
                            <span style="font-size: 0.9rem; font-weight: 600;">Sort By:</span>
                            <select id="sort-by" style="padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); background: var(--glass); outline: none;">
                                <option value="popular">Popularity</option>
                                <option value="low-high">Price: Low to High</option>
                                <option value="high-low">Price: High to Low</option>
                                <option value="new">Newest Arrivals</option>
                            </select>
                        </div>
                    </div>

                    <div id="products-list-grid" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">
                        <!-- Products injected here -->
                    </div>

                    <div id="no-products" style="display: none; text-align: center; padding: 100px 0;">
                        <img src="https://illustrations.popsy.co/amber/no-results-found.svg" alt="No Results" style="width: 200px; margin: 0 auto 20px;">
                        <h3>No products found</h3>
                        <p style="color: var(--text-muted);">Try adjusting your filters or search criteria.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-root"></div>

    <script type="module" src="js/products.js"></script>
</body>
</html>
