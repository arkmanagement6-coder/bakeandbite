<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Bake & Bite</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .cart-table th { text-align: left; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .cart-table td { padding: 25px 0; border-bottom: 1px solid var(--glass-border); vertical-align: top; }
        .qty-control { display: flex; align-items: center; border: 1px solid var(--glass-border); border-radius: var(--radius-sm); width: fit-content; }
        .qty-control button { border: none; background: transparent; padding: 5px 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header-root"></div>

    <main class="section">
        <div class="container">
            <h2 style="margin-bottom: 40px;">Your Shopping Cart</h2>

            <div id="cart-content" class="flex" style="gap: 60px;">
                <!-- Cart Items -->
                <div style="flex: 2;">
                    <div class="glass-card">
                        <table class="cart-table" style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Subtotal</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="cart-items-body">
                                <!-- Cart items injected here -->
                            </tbody>
                        </table>
                        
                        <div id="empty-cart" style="display: none; text-align: center; padding: 60px 0;">
                            <img src="https://illustrations.popsy.co/amber/shaking-hands.svg" alt="Empty Cart" style="width: 200px; margin-bottom: 20px;">
                            <h3>Your cart is empty</h3>
                            <p style="color: var(--text-muted); margin-bottom: 30px;">Add some sweet treats to your cart!</p>
                            <a href="products.html" class="btn btn-primary">Start Shopping</a>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div style="flex: 1;">
                    <div class="glass-card" style="position: sticky; top: 120px;">
                        <h3 style="margin-bottom: 25px;">Order Summary</h3>
                        
                        <div style="margin-bottom: 20px;">
                            <h4 style="margin-bottom: 10px; font-family: var(--font-sans); font-size: 0.9rem;">Have a Coupon?</h4>
                            <div class="flex" style="gap: 10px;">
                                <input type="text" id="coupon-code" placeholder="Enter code" style="flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); outline: none;">
                                <button id="apply-coupon" class="btn btn-outline" style="padding: 10px 20px;">Apply</button>
                            </div>
                            <p id="coupon-msg" style="font-size: 0.8rem; margin-top: 5px;"></p>
                        </div>

                        <div style="border-top: 1px solid var(--glass-border); padding-top: 20px;">
                            <div class="flex justify-between" style="margin-bottom: 12px;">
                                <span style="color: var(--text-muted);">Subtotal</span>
                                <span id="summary-subtotal" style="font-weight: 600;">₹0</span>
                            </div>
                            <div class="flex justify-between" style="margin-bottom: 12px;">
                                <span style="color: var(--text-muted);">Tax (5%)</span>
                                <span id="summary-tax" style="font-weight: 600;">₹0</span>
                            </div>
                            <div class="flex justify-between" style="margin-bottom: 12px;">
                                <span style="color: var(--text-muted);">Delivery Charge</span>
                                <span id="summary-delivery" style="font-weight: 600;">₹0</span>
                            </div>
                            <div id="discount-row" class="flex justify-between" style="margin-bottom: 12px; display: none; color: var(--success);">
                                <span>Discount</span>
                                <span id="summary-discount">-₹0</span>
                            </div>
                            <div class="flex justify-between" style="margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--primary);">
                                <span style="font-size: 1.2rem; font-weight: 800;">Total</span>
                                <span id="summary-total" style="font-size: 1.2rem; font-weight: 800; color: var(--primary);">₹0</span>
                            </div>
                        </div>

                        <a href="checkout.html" id="btn-checkout" class="btn btn-primary" style="width: 100%; margin-top: 30px; padding: 15px;">Proceed to Checkout</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-root"></div>

    <script type="module" src="js/cart.js"></script>
</body>
</html>
